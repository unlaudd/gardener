# =============================================================================
# 🌱 Огородник — GoReleaser Configuration (FIXED)
# =============================================================================
project_name: gardener

# ✅ Глобальный хук: запускается ПЕРЕД сборками, из корня репозитория.
# Это надежное место для сборки фронтенда, который потом встроится в бинарник.
before:
  hooks:
    # make -C gardener: перейти в папку с проектом и запустить цель
    - make -C gardener frontend-build

builds:
  - dir: gardener
    main: .
    env: [CGO_ENABLED=0]
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    # ✅ Убрали hooks отсюда — фронтенд уже собран в секции before

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - '^test:'
      - Merge pull request
      - Merge branch
      - '^Merge '

release:
  draft: false
  prerelease: auto
  mode: replace